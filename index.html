function CalendarScreen({ onBack }) {
  const teamColors = {
    A: { fg: COLORS.goldLight, bg: "rgba(201,162,39,.16)", bd: "rgba(201,162,39,.4)" },
    B: { fg: COLORS.tealLight, bg: "rgba(13,148,136,.16)", bd: "rgba(13,148,136,.4)" },
    C: { fg: COLORS.redLight, bg: "rgba(200,16,46,.16)", bd: "rgba(200,16,46,.4)" },
    D: { fg: "#a78bfa", bg: "rgba(167,139,250,.16)", bd: "rgba(167,139,250,.4)" },
  };
  const cyclePattern = ["day", "day", "off", "off", "night", "night", "off", "off"];
  const myTeam = "B";
  const monthDays = Array.from({ length: 30 }, (_, i) => i + 1);
  const offsetForTeam = { A: 0, B: 2, C: 4, D: 6 };
  const shiftForDay = (day, team) => cyclePattern[(day - 1 + offsetForTeam[team]) % 8];

  const [viewTeam, setViewTeam] = useState(myTeam);

  return (
    <div className="pb-28">
      <StatusBar />
      <TopBar title="Shift Calendar" onBack={onBack} />
      <div className="px-5">
        <p className="text-[12.5px] mb-4" style={{ color: COLORS.textMuted }}>June 2026 · Tap a team to see their schedule.</p>

        <div className="flex gap-2 mb-5">
          {Object.entries(teamColors).map(([team, c]) => (
            <button
              key={team}
              onClick={() => setViewTeam(team)}
              className="flex-1 py-2.5 rounded-xl flex items-center justify-center gap-1.5"
              style={{ background: viewTeam === team ? c.bg : COLORS.card, border: `1px solid ${viewTeam === team ? c.bd : COLORS.border}` }}
            >
              <div className="w-2 h-2 rounded-full" style={{ background: c.fg }} />
              <span className="text-[11px] font-bold" style={{ color: viewTeam === team ? c.fg : COLORS.textMuted }}>
                {team}{team === myTeam ? " (you)" : ""}
              </span>
            </button>
          ))}
        </div>

        <div className="grid grid-cols-7 gap-1.5 mb-4">
          {monthDays.map((day) => {
            const t = shiftForDay(day, viewTeam);
            const c = teamColors[viewTeam];
            const isOff = t === "off";
            return (
              <div key={day} className="rounded-lg py-2 text-center" style={{ background: isOff ? "rgba(255,255,255,.03)" : c.bg, border: `1px solid ${isOff ? "rgba(255,255,255,.06)" : c.bd}` }}>
                <p className="text-[9px] font-bold" style={{ color: isOff ? COLORS.textDim : c.fg }}>{day}</p>
                <p className="text-[7.5px] mt-0.5" style={{ color: isOff ? COLORS.textDim : c.fg }}>{t === "off" ? "Off" : t === "day" ? "Day" : "Night"}</p>
              </div>
            );
          })}
        </div>

        <p className="text-[10.5px] mb-6" style={{ color: COLORS.textDim }}>
          4 teams (A/B/C/D) rotate on an 8-day cycle: 2 days · 2 off · 2 nights · 2 off — offset so the floor is always covered.
        </p>

        <div className="rounded-xl p-3.5 flex items-center justify-around" style={{ background: COLORS.card, border: `1px solid ${COLORS.border}` }}>
          <div className="flex items-center gap-2">
            <div className="w-6 h-6 rounded-md flex items-center justify-center" style={{ background: "rgba(201,162,39,.15)" }}>
              <span className="text-[10px] font-bold" style={{ color: COLORS.goldLight }}>D</span>
            </div>
            <span className="text-[10.5px]" style={{ color: COLORS.textMuted }}>Day · 7AM–7PM</span>
          </div>
          <div className="flex items-center gap-2">
            <div className="w-6 h-6 rounded-md flex items-center justify-center" style={{ background: "rgba(13,148,136,.15)" }}>
              <span className="text-[10px] font-bold" style={{ color: COLORS.tealLight }}>N</span>
            </div>
            <span className="text-[10.5px]" style={{ color: COLORS.textMuted }}>Night · 7PM–7AM</span>
          </div>
        </div>
      </div>
    </div>
  );
}

            <div key={i} className="flex items-center gap-3 rounded-xl p-3.5" style={{ background: COLORS.card, border: `1px solid ${COLORS.border}` }}>
              <div className="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0" style={{ background: `${f.color}22` }}>
                <Icon size={16} color={f.color} />
              </div>
              <p className="text-[12.5px] font-bold">{f.t}</p>
            </div>
          );
        })}
      </div>
    </div>
  );

  const WhereToLook = () => (
    <div className="flex flex-col px-7 pt-14">
      <p className="text-[20px] font-extrabold text-center mb-2">Where to find what</p>
      <p className="text-[12.5px] text-center mb-8" style={{ color: COLORS.textMuted }}>So you never have to wonder where to look.</p>
      <div className="flex flex-col gap-3">
        <div className="rounded-xl p-4" style={{ background: "rgba(200,16,46,.07)", border: `1px solid ${COLORS.red}40` }}>
          <p className="text-[11px] font-bold mb-1" style={{ color: COLORS.redLight }}>THIS APP</p>
          <p className="text-[12px]" style={{ color: COLORS.text }}>Shifts, training, points, ideas — your daily work life</p>
        </div>
        <div className="rounded-xl p-4" style={{ background: COLORS.card, border: `1px solid ${COLORS.border}` }}>
          <p className="text-[11px] font-bold mb-1" style={{ color: COLORS.goldLight }}>MYDDF.AE / ORACLE</p>
          <p className="text-[12px]" style={{ color: COLORS.text }}>Official certificates, formal HR requests & records</p>
        </div>
        <div className="rounded-xl p-4" style={{ background: COLORS.card, border: `1px solid ${COLORS.border}` }}>
          <p className="text-[11px] font-bold mb-1" style={{ color: COLORS.tealLight }}>WHATSAPP GROUPS</p>
          <p className="text-[12px]" style={{ color: COLORS.text }}>Quick chats with your team — same as before, unchanged</p>
        </div>
      </div>
    </div>
  );

  return (
    <div className="h-full flex flex-col" style={{ background: COLORS.bg }}>
      <StatusBar />
      <div className="flex-1">
        {step === 0 && <HRWelcome />}
        {step === 1 && <Features />}
        {step === 2 && <WhereToLook />}
      </div>
      <div className="px-7 pb-8">
        <div className="flex justify-center gap-1.5 mb-5">
          {[0, 1, 2].map((i) => (
            <div key={i} className="h-1.5 rounded-full transition-all" style={{ width: i === step ? 20 : 6, background: i === step ? COLORS.red : COLORS.border }} />
          ))}
        </div>
        <button
          onClick={() => (step < 2 ? setStep(step + 1) : onDone())}
          className="w-full py-3.5 rounded-xl font-bold text-[14px]"
          style={{ background: COLORS.red, color: "#fff" }}
        >
          {step < 2 ? "Next" : "Get Started"}
        </button>
        {step < 2 && (
          <button onClick={onDone} className="w-full py-3 text-[12px] font-bold mt-1" style={{ color: COLORS.textMuted }}>
            Skip
          </button>
        )}
      </div>
    </div>
  );
}

// ---------- APP ROOT ----------
function StaffApp() {
  const [onboarded, setOnboarded] = useState(false);
  const [screen, setScreenRaw] = useState("home");
  const scrollRef = React.useRef(null);
  const scrollPositions = React.useRef({});
  const currentScreenRef = React.useRef("home");

  // Keep a continuously-updated record of scroll position for whichever screen is
  // currently mounted. This is more reliable than trying to capture scrollTop at the
  // exact moment of navigating away, which can race with React's render/commit timing.
  const handleScroll = () => {
    if (scrollRef.current) {
      scrollPositions.current[currentScreenRef.current] = scrollRef.current.scrollTop;
    }
  };

  const setScreen = (next) => {
    setScreenRaw(next);
  };

  // After the new screen has fully painted, jump to its remembered position (or top, on first visit).
  // useLayoutEffect alone fires before the browser finishes laying out long screens (e.g. Home with
  // 30+ cards) — scrollHeight isn't final yet, so the position gets clamped back near 0. Wrapping the
  // actual scroll-jump in requestAnimationFrame guarantees layout is complete first.
  React.useLayoutEffect(() => {
    currentScreenRef.current = screen;
    const raf = requestAnimationFrame(() => {
      if (scrollRef.current) {
        scrollRef.current.scrollTop = scrollPositions.current[screen] || 0;
      }
    });
    return () => cancelAnimationFrame(raf);
  }, [screen]);

  const handleNav = (id) => {
    setScreen(id);
  };

  let content;
  let activeTab = "home";
  if (screen === "home") { content = <HomeScreen onNav={setScreen} />; activeTab = "home"; }
  else if (screen === "leave") { content = <LeaveScreen onBack={() => setScreen("home")} />; activeTab = "home"; }
  else if (screen === "shifts") { content = <ShiftsScreen onBack={() => setScreen("home")} onNavCalendar={() => setScreen("calendar")} onNavMySales={() => setScreen("mysales")} />; activeTab = "shifts"; }
  else if (screen === "calendar") { content = <CalendarScreen onBack={() => setScreen("home")} />; activeTab = "shifts"; }
  else if (screen === "mysales") { content = <MySalesScreen onBack={() => setScreen("home")} />; activeTab = "home"; }
  else if (screen === "training") { content = <TrainingScreen onBack={() => setScreen("home")} />; activeTab = "training"; }
  else if (screen === "team") { content = <LeadershipScreen onBack={() => setScreen("home")} />; activeTab = "team"; }
  else if (screen === "profile") { content = <ProfileScreen onNav={setScreen} />; activeTab = "profile"; }
  else if (screen === "docs") {
    content = (
      <div className="pb-28">
        <StatusBar />
        <TopBar title="Documents" onBack={() => setScreen("home")} />
        <div className="px-5 flex flex-col gap-2">
          {["Employment Certificate", "Salary Certificate", "Uniform Reissue Request"].map((d) => (
            <button key={d} className="rounded-xl p-4 flex items-center gap-3 text-left" style={{ background: COLORS.card, border: `1px solid ${COLORS.border}` }}>
              <div className="w-9 h-9 rounded-lg flex items-center justify-center" style={{ background: "rgba(201,162,39,.15)" }}>
                <ClipboardList size={16} color={COLORS.goldLight} />
              </div>
              <p className="text-[12.5px] font-bold">{d}</p>
            </button>
          ))}
        </div>
      </div>
    );
    activeTab = "home";
  } else if (screen === "feedback") { content = <FeedbackScreen onBack={() => setScreen("home")} />; activeTab = "home"; }
  else if (screen === "ideas") { content = <IdeasScreen onBack={() => setScreen("home")} />; activeTab = "home"; }
  else if (screen === "about") { content = <AboutScreen onBack={() => setScreen("profile")} />; activeTab = "profile"; }
  else if (screen === "admin") { content = <AdminPanelScreen onBack={() => setScreen("profile")} />; activeTab = "profile"; }
  else if (screen === "points") { content = <PointsScreen onBack={() => setScreen("home")} />; activeTab = "home"; }
  else if (screen === "discounts") { content = <DiscountsScreen onBack={() => setScreen("home")} />; activeTab = "home"; }
  else if (screen === "mystery") { content = <MysteryShopperScreen onBack={() => setScreen("home")} />; activeTab = "home"; }
  else if (screen === "talents") { content = <TalentsIdeasScreen onBack={() => setScreen("home")} />; activeTab = "home"; }
  else if (screen === "competition") { content = <TalentsCupScreen onBack={() => setScreen("home")} />; activeTab = "home"; }
  else if (screen === "story") { content = <StoryScreen onBack={() => setScreen("home")} />; activeTab = "home"; }
  else if (screen === "eom") { content = <EOMScreen onBack={() => setScreen("home")} />; activeTab = "home"; }
  else if (screen === "quickhelp") { content = <QuickHelpScreen onBack={() => setScreen("home")} />; activeTab = "home"; }
  else if (screen === "whatsnew") { content = <WhatsNewScreen onBack={() => setScreen("home")} />; activeTab = "home"; }
  else if (screen === "miles") { content = <MilesScreen onBack={() => setScreen("home")} />; activeTab = "home"; }
  else if (screen === "transport") { content = <TransportScreen onBack={() => setScreen("home")} />; activeTab = "home"; }
  else if (screen === "careers") { content = <CareersScreen onBack={() => setScreen("home")} />; activeTab = "home"; }
  else if (screen === "certificates") { content = <CertificatesScreen onBack={() => setScreen("profile")} />; activeTab = "profile"; }
  else if (screen === "commendations") { content = <CommendationsScreen onBack={() => setScreen("profile")} />; activeTab = "profile"; }
  else if (screen === "autism") { content = <AutismScreen onBack={() => setScreen("home")} />; activeTab = "home"; }
  else if (screen === "bodylanguage") { content = <BodyLanguageScreen onBack={() => setScreen("home")} />; activeTab = "home"; }
  else if (screen === "reference") { content = <ReferenceScreen onBack={() => setScreen("home")} />; activeTab = "home"; }


  return (
    <PhoneFrame ref={scrollRef} onScroll={handleScroll}>
      {!onboarded ? (
        <Onboarding onDone={() => setOnboarded(true)} />
      ) : (
        <div className="relative h-full">
          {content}
          {screen !== "mysales" && <BottomNav active={activeTab} onNav={handleNav} />}
        </div>
      )}
    </PhoneFrame>
  );
}

</script>

<script>
function showError(title, detail) {
  var box = document.getElementById('error-display');
  box.style.display = 'block';
  box.textContent = title + '\n\n' + detail;
}

function setStatus(msg) {
  var el = document.getElementById('status');
  if (el) el.textContent = msg;
}

window.addEventListener('load', function () {
  var attempts = 0;
  function tryInit() {
    attempts++;
    if (typeof React === "undefined" || typeof ReactDOM === "undefined" || typeof Babel === "undefined") {
      if (attempts < 20) {
        setStatus("Step 1: checking libraries… (attempt " + attempts + ")");
        setTimeout(tryInit, 250);
        return;
      }
      var missing = [];
      if (typeof React === "undefined") missing.push("React");
      if (typeof ReactDOM === "undefined") missing.push("ReactDOM");
      if (typeof Babel === "undefined") missing.push("Babel");
      showError("LOAD ERROR", "These libraries did not load after 5 seconds: " + missing.join(", ") + ".\n\nThis usually means the device has no internet access right now, or this specific network is blocking unpkg.com.\n\nTry: open this file while connected to Wi-Fi or mobile data, not while offline.");
      return;
    }
    runApp();
  }
  tryInit();
});

function runApp() {
  try {
    setStatus("Step 2: reading source…");
    var source = document.getElementById('jsx-source').textContent;

    setStatus("Step 3: compiling JSX (this can take a few seconds on mobile)…");
    var compiled;
    try {
      compiled = Babel.transform(source, {
        presets: [["react", { runtime: "classic" }]]
      }).code;
    } catch (compileErr) {
      showError("COMPILE ERROR (Babel could not parse the code)", compileErr.message + (compileErr.stack ? "\n\n" + compileErr.stack : ""));
      return;
    }

    setStatus("Step 4: running app…");
    try {
      var runner = new Function("React", "ReactDOM", "useState",
        compiled + "\n;window.__StaffAppComponent = StaffApp;"
      );
      runner(React, ReactDOM, React.useState);
    } catch (runErr) {
      showError("RUNTIME ERROR (code ran but threw an exception)", runErr.message + (runErr.stack ? "\n\n" + runErr.stack : ""));
      return;
    }

    if (typeof window.__StaffAppComponent !== "function") {
      showError("SETUP ERROR", "StaffApp component was not found after running the code.");
      return;
    }

    var root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(window.__StaffAppComponent));
  } catch (outer) {
    showError("UNEXPECTED ERROR", outer.message + (outer.stack ? "\n\n" + outer.stack : ""));
  }
}
</script>
