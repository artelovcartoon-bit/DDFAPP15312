function PayslipScreen({onBack}){
  const [period,setPeriod]=useState("monthly");
  const [selectedYear,setSelectedYear]=useState("2026");
  const months=[
    {m:"January",net:"AED 8,450",gross:"AED 10,200",status:"paid"},
    {m:"February",net:"AED 8,450",gross:"AED 10,200",status:"paid"},
    {m:"March",net:"AED 8,850",gross:"AED 10,600",status:"paid"},
    {m:"April",net:"AED 8,450",gross:"AED 10,200",status:"paid"},
    {m:"May",net:"AED 8,450",gross:"AED 10,200",status:"paid"},
    {m:"June",net:"AED 9,100",gross:"AED 11,000",status:"paid"},
    {m:"July",net:"AED 8,450",gross:"AED 10,200",status:"pending"},
  ];
  const totalNet=months.filter(x=>x.status==="paid").reduce((a,b)=>a+parseInt(b.net.replace(/[^0-9]/g,"")),0);
  const totalGross=months.filter(x=>x.status==="paid").reduce((a,b)=>a+parseInt(b.gross.replace(/[^0-9]/g,"")),0);
  const halfYear=months.slice(0,6);
  const halfNet=halfYear.reduce((a,b)=>a+parseInt(b.net.replace(/[^0-9]/g,"")),0);

  return(
    <div className="pb-28">
      <StatusBar/>
      <TopBar title="Payslip" onBack={onBack}/>
      <div className="px-5">

        {/* Year selector */}
        <div className="flex gap-2 mb-4">
          {["2024","2025","2026"].map(y=>(
            <button key={y} onClick={()=>setSelectedYear(y)}
              className="flex-1 py-2.5 rounded-xl text-[12px] font-bold"
              style={{background:selectedYear===y?COLORS.teal:COLORS.card,color:selectedYear===y?"#fff":COLORS.textMuted,border:`1px solid ${selectedYear===y?COLORS.teal:COLORS.border}`}}>
              {y}
            </button>
          ))}
        </div>

        {/* Period tabs */}
        <div className="flex gap-2 mb-5">
          {[{id:"monthly",label:"Monthly"},{id:"biannual",label:"6 Months"},{id:"annual",label:"Full Year"}].map(p=>(
            <button key={p.id} onClick={()=>setPeriod(p.id)}
              className="flex-1 py-2 rounded-xl text-[11px] font-bold"
              style={{background:period===p.id?COLORS.red:COLORS.card,color:period===p.id?"#fff":COLORS.textMuted,border:`1px solid ${period===p.id?COLORS.red:COLORS.border}`}}>
              {p.label}
            </button>
          ))}
        </div>

        {/* Summary card */}
        {period==="annual"&&(
          <div className="rounded-2xl p-5 mb-5" style={{background:`linear-gradient(135deg,${COLORS.cardAlt},#1f1413)`,border:`1px solid ${COLORS.gold}55`}}>
            <p className="text-[11px] font-bold mb-3" style={{color:COLORS.goldLight}}>ANNUAL SUMMARY {selectedYear}</p>
            <div className="flex items-center justify-between mb-2">
              <span className="text-[11px]" style={{color:COLORS.textMuted}}>Total Gross</span>
              <span className="text-[14px] font-bold">AED {totalGross.toLocaleString()}</span>
            </div>
            <div className="flex items-center justify-between mb-4 pb-4" style={{borderBottom:`1px solid ${COLORS.border}`}}>
              <span className="text-[11px]" style={{color:COLORS.textMuted}}>Total Net</span>
              <span className="text-[16px] font-extrabold" style={{color:COLORS.goldLight}}>AED {totalNet.toLocaleString()}</span>
            </div>
            <button className="w-full py-3 rounded-xl font-bold text-[13px] flex items-center justify-center gap-2"
              style={{background:COLORS.gold,color:"#1a1410"}}>
              <FileText size={15}/> Download Full Year PDF
            </button>
          </div>
        )}

        {period==="biannual"&&(
          <div className="rounded-2xl p-5 mb-5" style={{background:`linear-gradient(135deg,${COLORS.cardAlt},#1f1413)`,border:`1px solid ${COLORS.teal}55`}}>
            <p className="text-[11px] font-bold mb-3" style={{color:COLORS.tealLight}}>JAN – JUN {selectedYear}</p>
            <div className="flex items-center justify-between mb-4 pb-4" style={{borderBottom:`1px solid ${COLORS.border}`}}>
              <span className="text-[11px]" style={{color:COLORS.textMuted}}>Net Total (6 months)</span>
              <span className="text-[16px] font-extrabold" style={{color:COLORS.tealLight}}>AED {halfNet.toLocaleString()}</span>
            </div>
            <button className="w-full py-3 rounded-xl font-bold text-[13px] flex items-center justify-center gap-2"
              style={{background:COLORS.teal,color:"#fff"}}>
              <FileText size={15}/> Download 6-Month PDF
            </button>
          </div>
        )}

        {/* Monthly list */}
        <p className="text-[11px] font-bold mb-3" style={{color:COLORS.textMuted}}>
          {period==="monthly"?"ALL MONTHS":period==="biannual"?"MONTHLY BREAKDOWN — H1":"MONTHLY BREAKDOWN"}
        </p>
        <div className="flex flex-col gap-2">
          {(period==="biannual"?halfYear:months).map((m,i)=>(
            <div key={i} className="rounded-xl p-4 flex items-center gap-3"
              style={{background:COLORS.card,border:`1px solid ${m.status==="pending"?COLORS.gold+"55":COLORS.border}`}}>
              <div className="flex-1">
                <div className="flex items-center gap-2 mb-1">
                  <p className="text-[12.5px] font-bold">{m.m} {selectedYear}</p>
                  {m.status==="pending"&&(
                    <span className="text-[8px] font-bold px-1.5 py-0.5 rounded-full" style={{background:"rgba(201,162,39,.2)",color:COLORS.goldLight}}>PENDING</span>
                  )}
                </div>
                <p className="text-[10.5px]" style={{color:COLORS.textMuted}}>Gross {m.gross}</p>
              </div>
              <div className="text-right mr-2">
                <p className="text-[13px] font-extrabold" style={{color:m.status==="pending"?COLORS.textMuted:COLORS.tealLight}}>{m.net}</p>
                <p className="text-[9px]" style={{color:COLORS.textDim}}>net pay</p>
              </div>
              {m.status==="paid"&&(
                <button className="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0"
                  style={{background:"rgba(13,148,136,.15)"}}>
                  <FileText size={14} color={COLORS.tealLight}/>
                </button>
              )}
            </div>
          ))}
        </div>

        {/* Download all button for monthly view */}
        {period==="monthly"&&(
          <button className="w-full py-3.5 rounded-xl font-bold text-[13px] mt-4 flex items-center justify-center gap-2"
            style={{background:COLORS.card,border:`1px solid ${COLORS.border}`,color:COLORS.text}}>
            <FileText size={15} color={COLORS.goldLight}/> Download All as ZIP
          </button>
        )}
      </div>
    </div>
  );
}

function StaffApp(){
  const [phase,setPhase]=useState("login");
  const [staffNum,setStaffNum]=useState("");
  const [screen,setScreenRaw]=useState("home");
  const scrollRef=React.useRef(null);
  const scrollPos=React.useRef({});
  const curScreen=React.useRef("home");
  const handleScroll=()=>{if(scrollRef.current)scrollPos.current[curScreen.current]=scrollRef.current.scrollTop;};
  React.useLayoutEffect(()=>{curScreen.current=screen;const raf=requestAnimationFrame(()=>{if(scrollRef.current)scrollRef.current.scrollTop=scrollPos.current[screen]||0;});return()=>cancelAnimationFrame(raf);},[screen]);
  const handleLogin=(num)=>{setStaffNum(num);setPhase("onboarding");};
  const handleLogout=()=>{setPhase("login");setStaffNum("");setScreenRaw("home");};
  const setScreen=(s)=>setScreenRaw(s);
  if(phase==="login")return(<PhoneFrame><LoginScreen onLogin={handleLogin}/></PhoneFrame>);
  if(phase==="onboarding")return(<PhoneFrame><Onboarding onDone={()=>setPhase("app")}/></PhoneFrame>);
  let content;let activeTab="home";
  if(screen==="home"){content=<HomeScreen onNav={setScreen} staffNum={staffNum}/>;activeTab="home";}
  else if(screen==="leave"){content=<LeaveScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="shifts"){content=<ShiftsScreen onBack={()=>setScreen("home")} onNavCalendar={()=>setScreen("calendar")} onNavMySales={()=>setScreen("mysales")}/>;activeTab="shifts";}
  else if(screen==="calendar"){content=<CalendarScreen onBack={()=>setScreen("home")}/>;activeTab="shifts";}
  else if(screen==="mysales"){content=<MySalesScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="training"){content=<TrainingScreen onBack={()=>setScreen("home")}/>;activeTab="training";}
  else if(screen==="team"){content=<LeadershipScreen onBack={()=>setScreen("home")}/>;activeTab="team";}
  else if(screen==="profile"){content=<ProfileScreen onNav={setScreen} staffNum={staffNum} onLogout={handleLogout}/>;activeTab="profile";}
  else if(screen==="points"){content=<PointsScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="discounts"){content=<DiscountsScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="mystery"){content=<MysteryShopperScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="feedback"){content=<FeedbackScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="ideas"){content=<IdeasScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="quickhelp"){content=<QuickHelpScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="miles"){content=<MilesScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="transport"){content=<TransportScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="eom"){content=<EOMScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="bodylanguage"){content=<BodyLanguageScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="autism"){content=<AutismScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="reference"){content=<ReferenceScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="story"){content=<StoryScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="careers"){content=<CareersScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="talents"){content=<TalentsIdeasScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="competition"){content=<TalentsCupScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="certificates"){content=<CertificatesScreen onBack={()=>setScreen("profile")}/>;activeTab="profile";}
  else if(screen==="commendations"){content=<CommendationsScreen onBack={()=>setScreen("profile")}/>;activeTab="profile";}
  else if(screen==="admin"){content=<AdminPanelScreen onBack={()=>setScreen("profile")}/>;activeTab="profile";}
  else if(screen==="isr"){content=<ISRScreen onNav={setScreen} onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="myddf"){content=<MyDDFScreen onNav={setScreen} onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="oracle"){content=<OracleScreen onNav={setScreen} onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="payslip"){content=<PayslipScreen onBack={()=>setScreen("oracle")}/>;activeTab="home";}
  else if(screen==="about"){content=<AboutScreen onBack={()=>setScreen("profile")}/>;activeTab="profile";}
  else if(screen==="whatsnew"){content=<WhatsNewScreen onBack={()=>setScreen("home")}/>;activeTab="home";}
  else if(screen==="docs"){content=<SimpleScreen title="Documents" onBack={()=>setScreen("home")}>{["Employment Certificate","Salary Certificate","Uniform Reissue Request"].map(d=><button key={d} className="rounded-xl p-4 flex items-center gap-3 text-left mb-2" style={{background:COLORS.card,border:`1px solid ${COLORS.border}`}}><div className="w-9 h-9 rounded-lg flex items-center justify-center" style={{background:"rgba(201,162,39,.15)"}}><FileText size={16} color={COLORS.goldLight}/></div><p className="text-[12.5px] font-bold">{d}</p></button>)}</SimpleScreen>;activeTab="home";}
  return(<PhoneFrame ref={scrollRef} onScroll={handleScroll}><div className="relative h-full">{content}<BottomNav active={activeTab} onNav={setScreen}/></div></PhoneFrame>);
}

</script>
<script>
function showErr(t,d){var b=document.getElementById("err");b.style.display="block";b.textContent=t+"\n\n"+d;}
function setStatus(m){var e=document.getElementById("status");if(e)e.textContent=m;}
window.addEventListener("load",function(){
  var n=0;
  function t(){n++;if(typeof React==="undefined"||typeof ReactDOM==="undefined"||typeof Babel==="undefined"){if(n<20){setStatus("Loading libraries… "+n);setTimeout(t,300);return;}showErr("LOAD ERROR","Libraries failed to load. Check internet connection.");return;}run();}
  t();
});
function run(){
  try{
    setStatus("Compiling JSX…");
    var src=document.getElementById("jsx").textContent;
    var compiled;
    try{compiled=Babel.transform(src,{presets:[["react",{runtime:"classic"}]]}).code;}
    catch(e){showErr("COMPILE ERROR",e.message+(e.stack?"\n\n"+e.stack:""));return;}
    setStatus("Starting app…");
    try{var fn=new Function("React","ReactDOM","useState",compiled+"\n;window.__App=StaffApp;");fn(React,ReactDOM,React.useState);}
    catch(e){showErr("RUNTIME ERROR",e.message+(e.stack?"\n\n"+e.stack:""));return;}
    if(typeof window.__App!=="function"){showErr("SETUP ERROR","StaffApp not found.");return;}
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(window.__App));
  }catch(e){showErr("UNEXPECTED ERROR",e.message+(e.stack?"\n\n"+e.stack:""));}
}
</script>
</body>
